<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Feedback App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .card h1 { color: #fff; font-size: 24px; margin-bottom: 6px; }
        .card p.subtitle { color: #6b7280; font-size: 14px; margin-bottom: 30px; }

        label { display: block; color: #9ca3af; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

        input, textarea {
            width: 100%;
            background: #1a2235;
            border: 1px solid #1f2937;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus { border-color: #ff9900; }
        textarea { min-height: 120px; resize: vertical; }

        button {
            width: 100%;
            background: #ff9900;
            color: #000;
            font-weight: 700;
            font-size: 15px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { background: #e68a00; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #4b5563; color: #9ca3af; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .powered { text-align: center; margin-top: 24px; color: #374151; font-size: 12px; }
        .powered span { color: #ff9900; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Leave Feedback 💬</h1>
        <p class="subtitle">Your feedback is stored securely in AWS DynamoDB via Lambda.</p>

        <form id="feedbackForm" onsubmit="return false;">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="James Ogbodu" required>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>

            <label>Message</label>
            <textarea id="message" placeholder="Write your feedback here..." required></textarea>

            <button type="button" id="submitBtn" onclick="submitFeedback()">Send Feedback</button>
        </form>

        <div class="message" id="responseMsg"></div>

        <p class="powered">Powered by <span>AWS Lambda</span> · <span>API Gateway</span> · <span>DynamoDB</span></p>
    </div>

    <script>
        async function submitFeedback() {
            const API_URL = 'https://c5r3phgsr8.execute-api.us-east-1.amazonaws.com/feedback';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('responseMsg');

            if (!name || !email || !message) {
                msg.textContent = '⚠️ Please fill in all fields.';
                msg.style.display = 'block';
                msg.style.background = 'rgba(245,158,11,0.1)';
                msg.style.border = '1px solid rgba(245,158,11,0.3)';
                msg.style.color = '#f59e0b';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.style.display = 'none';

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, message })
                });

                msg.textContent = '✅ Feedback submitted successfully!';
                msg.style.display = 'block';
                msg.style.background = 'rgba(0,212,100,0.1)';
                msg.style.border = '1px solid rgba(0,212,100,0.3)';
                msg.style.color = '#00d464';
                msg.style.padding = '12px 16px';
                msg.style.borderRadius = '8px';
                msg.style.marginTop = '16px';

                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('message').value = '';

            } catch (err) {
                msg.textContent = '❌ Network error. Please check your connection.';
                msg.style.display = 'block';
                msg.style.background = 'rgba(239,68,68,0.1)';
                msg.style.border = '1px solid rgba(239,68,68,0.3)';
                msg.style.color = '#ef4444';
                msg.style.padding = '12px 16px';
                msg.style.borderRadius = '8px';
                msg.style.marginTop = '16px';
            }

            btn.disabled = false;
            btn.textContent = 'Send Feedback';
        }
    </script>
</body>
</html>
